name: Run Backtest

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Get week number for cache key
        id: week
        run: echo "key=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: yfinance-data-${{ steps.week.outputs.key }}
          restore-keys: yfinance-data-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt   # pulls in requirements.txt plus pytest

      - name: Run backtest engine
        run: python run_all.py

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/cache
          key: yfinance-data-${{ steps.week.outputs.key }}
